<!DOCTYPE html>
<html>
<head>
  <title>Simple Quiz</title>
</head>
<body>

<h2>Quiz</h2>

<form id="quiz">

  <p>1. 2 + 2 = ?</p>
  <input type="radio" name="q1" value="4"> 4<br>
  <input type="radio" name="q1" value="5"> 5<br>

  <p>2. Capital of France?</p>
  <input type="radio" name="q2" value="Paris"> Paris<br>
  <input type="radio" name="q2" value="London"> London<br>

  <br>
  <button type="button" onclick="checkAnswers()">Submit</button>

</form>

<h3 id="result"></h3>

<script>
function checkAnswers() {
  let score = 0;

  let q1 = document.querySelector('input[name="q1"]:checked');
  let q2 = document.querySelector('input[name="q2"]:checked');

  if (q1 && q1.value === "4") score++;
  if (q2 && q2.value === "Paris") score++;

  document.getElementById("result").innerText = "Your Score: " + score + "/2";
}
</script>

</body>
</html>
